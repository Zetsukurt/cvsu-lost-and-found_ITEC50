<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Lost & Found Web</title>
    <link rel="stylesheet" href="../css-gods/style-upload.css">
    <link rel="icon" type="image/png" href="/images/logo.png">    
    <script src="../js/supabase.js"></script>
</head>
<body class="upload-wrapper">

    <nav class="navbar">
        <div class="nav-logo">
            <span class="icon"></span>
            <span class="logo-text">Lost & Found Web</span>
        </div>
        <ul class="nav-links">
            <li><a href="../html/home-gods.html" >HOME</a></li>
            <li><a href="gallery.html">PUBLIC GALLERY</a></li>
            <li><a href="#">MY FOUND ITEMS</a></li>
            <li><a href="#">MY CLAIMS</a></li>
            <li><a href="/html/upload-gods.html"class="active">UPLOAD</a></li>
        </ul>
        <!-- Updated nav-user section -->
        <div class="nav-user">
            <span id="userNameDisplay" class="user-name-text"></span>
            <div class="user-avatar-wrapper">
                <div class="user-avatar"></div>
                <!-- Hidden Logout Dropdown -->
                <div id="userDropdown" class="user-dropdown">
                    <button id="logoutBtn" class="logout-action">Logout</button>
                </div>
            </div>
            <span id="menuToggle" class="menu-dots" style="cursor: pointer;">⋮</span>
        </div>
    </nav>

    <main class="upload-container">
        <!-- Left Side: Reporting Form -->
        <section class="form-panel">
            <h2>Report a Found Item</h2>
            <form id="uploadForm">
                <div class="input-group">
                    <input type="text" id="itemName" placeholder="Item Name" required>
                </div>

                <div class="input-group">
                    <label for="category">Category</label>
                    <select id="category" class="custom-select" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Personal">Personal Items</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Documents">Documents</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Short description..." required></textarea>
                </div>

                <div class="input-group">
                    <label for="location">Where was it found?</label>
                    <!-- Changed to Text Input -->
                    <input type="text" id="location" placeholder="e.g. CvSU Main Library" required>
                </div>

                <div class="input-group">
                    <label>Upload Photo</label>
                    <div class="custom-file-upload">
                        <label for="itemPhoto" class="file-btn">Choose file</label>
                        <span id="fileNameDisplay">No file chosen</span>
                        <input type="file" id="itemPhoto" accept="image/*" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Submit Report</button>
            </form>
        </section>

        <!-- Right Side: Hero Text -->
        <section class="info-panel">
            <div class="hero-quote">
                <h1>INTEGRITY IS DOING THE RIGHT THING, EVEN WHEN NO ONE IS WATCHING.</h1>
                <p>Small acts of character define the standard of our institution.</p>
            </div>
            <div class="recent-section">
                <h3>Recently Found Items</h3>
                <div class="recent-grid" id="recentGrid">
                    <!-- JS will inject cards here -->
                </div>
            </div>
        </section>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/upload.js"></script>
    <script src="../js/nav-func.js"></script>
</body>
</html>
