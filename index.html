<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CvSU Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-green-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">CvSU Lost & Found</h1>
            <div id="userStatus" class="text-sm">Not Logged In</div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <section class="bg-white p-6 rounded-xl shadow-md h-fit">
            <h2 class="text-lg font-bold mb-4 text-green-800">Report a Found Item</h2>
            <form id="reportForm" class="space-y-4">
                <input type="text" id="title" placeholder="Item Name (e.g., Green Wallet)" required 
                    class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                
                <textarea id="description" placeholder="Short description..." 
                    class="w-full border border-gray-300 p-2 rounded h-24"></textarea>
                
                <input type="text" id="location" placeholder="Where was it found?" 
                    class="w-full border border-gray-300 p-2 rounded">
                
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Upload Photo</label>
                    <input type="file" id="itemImage" accept="image/*" class="text-sm">
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded transition">
                    Submit Report
                </button>
            </form>
        </section>

        <section class="md:col-span-2">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Recent Found Items</h2>
            <div id="itemGallery" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <p class="text-gray-500">Loading items...</p>
            </div>
        </section>

    </main>

    <script src="js/config.js"></script>
    <script src="js/jscript.js"></script>
</body>
</html>
